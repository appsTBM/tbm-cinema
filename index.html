<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pink: #ff2d95;
            --cyan: #00d4ff;
            --purple: #b300ff;
            --bg: #0a0a14;
            --card: #1a1a30;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">КИНО</div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const count = text.trim().split('\n').length - 1;
                document.body.innerHTML += `<h2 style="text-align:center;margin-top:50px;">Загружено ${count} фильмов!</h2>`;
            } catch(e) {
                document.body.innerHTML += `<p style="color:red;text-align:center;">Ошибка загрузки</p>`;
            }
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
