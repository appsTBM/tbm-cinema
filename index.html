<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a14; color:white; font-family:sans-serif; text-align:center; padding:50px 20px; }
        .logo { font-size:48px; font-weight:900; background:linear-gradient(#ff2d95,#00d4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    </style>
</head>
<body>
    <div class="logo">TBM CINEMA</div>
    <h2 id="status">Загрузка фильмов...</h2>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        fetch(CSV_URL)
            .then(r => r.text())
            .then(text => {
                const count = text.trim().split('\n').length - 1;
                document.getElementById('status').innerHTML = `🎬 Загружено <b>${count}</b> фильмов!<br><br>Бот готов к использованию.`;
            })
            .catch(() => {
                document.getElementById('status').innerHTML = 'Ошибка загрузки. Проверь таблицу.';
            });
    </script>
</body>
</html>
