<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pink: #ff2d95;
            --cyan: #00d4ff;
            --purple: #b300ff;
            --bg: #0a0a14;
            --card: #1a1a30;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,45,149,0.3);
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,45,149,0.7);
        }
        .search {
            flex: 1;
            margin: 0 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,45,149,0.4);
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
            font-size: 16px;
        }
        .search:focus {
            outline: none;
            border-color: var(--pink);
            box-shadow: 0 0 20px rgba(255,45,149,0.5);
        }

        .genres {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 10px;
            white-space: nowrap;
        }
        .genre-btn {
            padding: 10px 22px;
            border-radius: 30px;
            background: transparent;
            border: 1px solid #666;
            color: #ddd;
            transition: all 0.3s;
        }
        .genre-btn.active {
            background: linear-gradient(90deg, var(--pink), var(--purple));
            border: none;
            color: white;
            box-shadow: 0 0 20px rgba(255,45,149,0.6);
        }

        .hero {
            height: 380px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 24px;
            position: relative;
            margin-bottom: 20px;
        }
        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent, var(--bg) 80%);
        }
        .hero-content { z-index: 2; }

        .section {
            padding: 0 16px 30px;
        }
        .section-title {
            font-size: 22px;
            margin: 20px 0 16px;
            padding-left: 14px;
            position: relative;
        }
        .section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            width: 5px;
            height: 24px;
            background: var(--pink);
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 14px;
            padding-bottom: 15px;
            scrollbar-width: none;
        }
        .movie-card {
            width: 135px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .movie-card img {
            width: 100%;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
        }
        .movie-card .title {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.3;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: var(--card);
            width: 92%;
            max-width: 440px;
            border-radius: 20px;
            overflow: hidden;
        }

        .player {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1100;
            flex-direction: column;
        }
        button {
            background: linear-gradient(90deg, var(--pink), var(--purple));
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TBM CINEMA</div>
        <input type="text" id="searchInput" class="search" placeholder="🔍 Поиск фильмов...">
    </div>

    <div class="genres" id="genres"></div>

    <div class="hero" id="hero">
        <div class="hero-content">
            <h1 id="heroTitle" style="font-size:28px;margin-bottom:8px;"></h1>
            <button onclick="watchCurrentHero()">▶ Смотреть сейчас</button>
        </div>
    </div>

    <div class="section">
        <h2 class="section-title">🔥 Популярное</h2>
        <div class="horizontal-scroll" id="popularMovies"></div>
    </div>

    <div class="section">
        <h2 class="section-title">⭐ Классика</h2>
        <div class="horizontal-scroll" id="classicMovies"></div>
    </div>

    <!-- Модальное окно -->
    <div class="modal" id="movieModal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- Плеер -->
    <div class="player" id="player">
        <button onclick="closePlayer()" style="position:absolute;top:15px;left:15px;z-index:10;font-size:24px;">✕</button>
        <iframe id="youtubePlayer" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        let allMovies = [];
        let currentHeroIndex = 0;

        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                allMovies = parseCSV(text);
                renderEverything();
            } catch(e) {
                alert("Ошибка загрузки фильмов. Проверь интернет.");
            }
        }

        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            return lines.slice(1).map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    id: cols[0],
                    title: cols[1],
                    genre: cols[2],
                    year: cols[3],
                    rating: cols[4],
                    description: cols[5],
                    posterUrl: cols[6],
                    youtubeId: cols[7]
                };
            }).filter(m => m.title);
        }

        function renderEverything() {
            renderGenres();
            renderMovies('popularMovies', allMovies);
            renderMovies('classicMovies', allMovies.filter(m => parseInt(m.year) < 1950));
            updateHero();
        }

        function renderGenres() {
            const genres = ['all','horror','scifi','comedy','drama'];
            document.getElementById('genres').innerHTML = genres.map(g => `
                <button class="genre-btn ${g==='all'?'active':''}" data-genre="${g}">
                    ${g==='all'?'🔥 Все': g==='horror'?'😱 Ужасы': g==='scifi'?'🚀 Фантастика': g==='comedy'?'😂 Комедия':'😢 Драма'}
                </button>
            `).join('');
        }

        function renderMovies(id, movies) {
            const container = document.getElementById(id);
            container.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="showMovie(${movie.id})">
                    <img src="${movie.posterUrl}" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/135x200/1a1a30/ffffff?text=No+Poster'">
                    <div class="title">${movie.title} (${movie.year})</div>
                </div>
            `).join('');
        }

        function updateHero() {
            if (!allMovies.length) return;
            const movie = allMovies[currentHeroIndex % allMovies.length];
            document.getElementById('hero').style.backgroundImage = `url('${movie.posterUrl}')`;
            document.getElementById('heroTitle').textContent = movie.title;
        }

        function showMovie(id) {
            const movie = allMovies.find(m => m.id == id);
            if (!movie) return;

            document.getElementById('modalContent').innerHTML = `
                <img src="${movie.posterUrl}" style="width:100%;display:block;" onerror="this.src='https://via.placeholder.com/400x300/1a1a30/ffffff?text=No+Poster'">
                <div style="padding:20px;">
                    <h2>${movie.title} (${movie.year})</h2>
                    <p>⭐ ${movie.rating} • ${movie.genre}</p>
                    <p>${movie.description || 'Классический фильм в общественном достоянии.'}</p>
                    <button onclick="watchMovie('${movie.youtubeId}'); document.getElementById('movieModal').style.display='none';" style="width:100%;margin-top:15px;">▶ Смотреть фильм</button>
                </div>
            `;
            document.getElementById('movieModal').style.display = 'flex';
        }

        function watchMovie(youtubeId) {
            document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0`;
            document.getElementById('player').style.display = 'flex';
        }

        function watchCurrentHero() {
            const movie = allMovies[currentHeroIndex % allMovies.length];
            if (movie) watchMovie(movie.youtubeId);
        }

        function closePlayer() {
            document.getElementById('player').style.display = 'none';
            document.getElementById('youtubePlayer').src = '';
        }

        // Поиск
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
            renderMovies('popularMovies', filtered);
        });

        // Загрузка
        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
