<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pink: #ff2d95;
            --cyan: #00d4ff;
            --purple: #b300ff;
            --bg: #0a0a14;
            --card: #1a1a30;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .movies {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px;
        }
        .movie-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            width: 140px;
            cursor: pointer;
        }
        .movie-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TBM CINEMA</div>
    </div>

    <div class="movies" id="movies"></div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const lines = text.trim().split('\n');
                const movies = lines.slice(1).map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        title: cols[1],
                        year: cols[3],
                        posterUrl: cols[6],
                        youtubeId: cols[7]
                    };
                }).filter(m => m.title);

                const container = document.getElementById('movies');
                container.innerHTML = movies.map(movie => `
                    <div class="movie-card" onclick="watch('${movie.youtubeId}')">
                        <img src="${movie.posterUrl || 'https://via.placeholder.com/140x200?text=No+Poster'}" onerror="this.src='https://via.placeholder.com/140x200/333/fff?text=${encodeURIComponent(movie.title)}'">
                        <div style="padding:8px;font-size:13px;">${movie.title} (${movie.year})</div>
                    </div>
                `).join('');
            } catch(e) {
                console.error(e);
            }
        }

        function watch(youtubeId) {
            window.open(`https://www.youtube.com/embed/${youtubeId}?autoplay=1`, '_blank');
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
