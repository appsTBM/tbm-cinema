<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a14; color:white; font-family:sans-serif; margin:0; }
        .header { padding:12px 16px; background:rgba(10,10,20,0.95); display:flex; justify-content:space-between; align-items:center; }
        .logo { font-size:28px; font-weight:900; background:linear-gradient(#ff2d95,#00d4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .movies { display:flex; flex-wrap:wrap; gap:12px; padding:16px; }
        .movie-card { width:140px; background:#1a1a30; border-radius:12px; overflow:hidden; cursor:pointer; }
        .movie-card img { width:100%; height:200px; object-fit:cover; }
        .movie-card .info { padding:8px; font-size:13px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TBM CINEMA</div>
    </div>
    <div class="movies" id="movies"></div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            const container = document.getElementById('movies');
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const lines = text.trim().split('\n');
                
                const movies = lines.slice(1).map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        title: cols[1] || '',
                        year: cols[3] || '',
                        posterUrl: cols[6] || '',
                        youtubeId: cols[7] || ''
                    };
                }).filter(m => m.title && m.youtubeId);

                container.innerHTML = movies.map(m => `
                    <div class="movie-card" onclick="watch('${m.youtubeId}')">
                        <img src="${m.posterUrl}" onerror="this.src='https://via.placeholder.com/140x200/1a1a30/ffffff?text=${encodeURIComponent(m.title)}'">
                        <div class="info"><strong>${m.title}</strong><br><small>${m.year}</small></div>
                    </div>
                `).join('');
            } catch(e) {
                container.innerHTML = '<p style="color:red;padding:20px">Ошибка загрузки</p>';
            }
        }

        function watch(id) {
            window.open(`https://www.youtube.com/embed/${id}?autoplay=1`, '_blank');
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
