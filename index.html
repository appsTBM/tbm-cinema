<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pink: #ff2d95;
            --cyan: #00d4ff;
            --purple: #b300ff;
            --bg: #0a0a14;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
            text-align: center;
            padding: 40px 20px;
        }
        .logo {
            font-size: 42px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff2d95, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }
        h2 { color: #0f0; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="logo">TBM CINEMA</div>
    <h2>Загрузка фильмов...</h2>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const count = text.trim().split('\n').length - 1;
                document.querySelector('h2').innerHTML = `🎬 Загружено <b>${count}</b> фильмов!<br><br>Приложение готово.<br>Открывай бота @KinoClassicBot`;
            } catch(e) {
                document.querySelector('h2').innerHTML = '❌ Ошибка загрузки базы фильмов';
            }
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
