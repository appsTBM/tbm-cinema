<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TBM Cinema</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background:#0a0a14; color:white; font-family:sans-serif; margin:0; }
        .header { padding:12px 16px; background:rgba(10,10,20,0.95); display:flex; align-items:center; gap:12px; }
        .logo { font-size:26px; font-weight:900; background:linear-gradient(#ff2d95,#00d4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .search { flex:1; background:#1a1a30; border:none; padding:10px 16px; border-radius:25px; color:white; }
        
        .hero { height: 360px; background-size: cover; background-position: center; position: relative; display:flex; align-items:flex-end; padding:24px; }
        .hero::after { content:''; position:absolute; inset:0; background:linear-gradient(transparent, #0a0a14 82%); }
        .hero-content { position:relative; z-index:2; max-width:85%; }
        
        .genres { display:flex; gap:8px; padding:0 16px 14px; overflow-x:auto; }
        .genre-btn { padding:7px 18px; border-radius:20px; background:#1a1a30; border:1px solid #444; color:#ccc; }
        .genre-btn.active { background:#ff2d95; color:white; border:none; }
        
        .movies { display:flex; flex-wrap:wrap; gap:14px; padding:0 16px 40px; }
        .movie-card {
            width:155px; background:#1a1a30; border-radius:14px; overflow:hidden; cursor:pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
        }
        .movie-card img { width:100%; height:195px; object-fit:cover; }
        .movie-card .info { padding:10px 12px; }
        .movie-card .title { font-weight:600; font-size:14px; margin-bottom:4px; }
        .movie-card .meta { font-size:12px; color:#aaa; margin-bottom:6px; }
        .movie-card .desc { 
            font-size:12px; color:#ccc; line-height:1.3; 
            display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; 
            overflow:hidden; min-height:48px;
        }
        
        .player { display:none; position:fixed; inset:0; background:#000; z-index:1000; flex-direction:column; }
        .player-header { padding:12px 16px; background:#111; display:flex; justify-content:space-between; align-items:center; }
        .close-player { background:#333; color:white; border:none; width:38px; height:38px; border-radius:50%; font-size:22px; cursor:pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">TBM CINEMA</div>
        <input type="text" id="searchInput" class="search" placeholder="Поиск фильмов...">
    </div>

    <!-- Hero -->
    <div class="hero" id="hero">
        <div class="hero-content">
            <h2 id="heroTitle" style="margin:0 0 6px 0; font-size:26px;"></h2>
            <p id="heroDesc" style="margin:0 0 14px 0; opacity:0.85; font-size:14px;"></p>
            <button onclick="watchHero()" style="background:#ff2d95; color:white; border:none; padding:12px 28px; border-radius:30px; font-weight:bold;">▶ Смотреть</button>
        </div>
    </div>

    <div class="genres" id="genres"></div>
    <div class="movies" id="movies"></div>

    <!-- Плеер -->
    <div class="player" id="player">
        <div class="player-header">
            <div id="playerTitle" style="font-size:17px; font-weight:600; flex:1; padding-right:10px;"></div>
            <button class="close-player" onclick="closePlayer()">✕</button>
        </div>
        <div style="flex:1; position:relative; background:#000;">
            <iframe id="ytPlayer" frameborder="0" allowfullscreen style="width:100%; height:100%; position:absolute; top:0; left:0;"></iframe>
            
            <div id="playerError" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#ccc;">
                <p style="margin-bottom:16px;">Не удалось воспроизвести видео</p>
                <button onclick="openOnYouTube()" style="background:#ff2d95; color:white; border:none; padding:10px 24px; border-radius:25px; font-weight:bold;">
                    Открыть на YouTube
                </button>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";
        let allMovies = [];
        let currentHeroIndex = 0;
        let currentYoutubeId = '';

        async function loadMovies() {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const lines = text.trim().split('\n');
            
            allMovies = lines.slice(1).map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    title: cols[1] || '',
                    genre: cols[2] || '',
                    year: cols[3] || '',
                    rating: cols[5] || '',
                    description: cols[6] || '',
                    posterUrl: cols[7] || '',
                    youtubeId: cols[8] || ''
                };
            }).filter(m => m.title && m.youtubeId);

            startHeroRotation();
            renderGenres();
            renderMovies(allMovies);

            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const filtered = allMovies.filter(m => m.title.toLowerCase().includes(term));
                renderMovies(filtered);
            });
        }

        function startHeroRotation() {
            if (allMovies.length === 0) return;
            showHeroMovie(0);
            setInterval(() => {
                currentHeroIndex = (currentHeroIndex + 1) % allMovies.length;
                showHeroMovie(currentHeroIndex);
            }, 8000);
        }

        function showHeroMovie(index) {
            const movie = allMovies[index];
            if (!movie) return;
            document.getElementById('hero').style.backgroundImage = `url('${movie.posterUrl}')`;
            document.getElementById('heroTitle').textContent = movie.title;
            document.getElementById('heroDesc').textContent = `${movie.year} • ${movie.genre} • ⭐ ${movie.rating}`;
            window.currentHeroMovie = movie;
        }

        function renderGenres() {
            const genresDiv = document.getElementById('genres');
            const genres = ['all','horror','comedy','drama','thriller','scifi','classic'];
            genresDiv.innerHTML = genres.map(g => `
                <button class="genre-btn ${g==='all'?'active':''}" data-genre="${g}">
                    ${g === 'all' ? 'Все' : g}
                </button>
            `).join('');

            genresDiv.addEventListener('click', (e) => {
                if (e.target.classList.contains('genre-btn')) {
                    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    const genre = e.target.dataset.genre;
                    const filtered = genre === 'all' ? allMovies : allMovies.filter(m => m.genre === genre);
                    renderMovies(filtered);
                }
            });
        }

        function renderMovies(movies) {
            const container = document.getElementById('movies');
            container.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="playMovie('${m.youtubeId}')">
                    <img src="${m.posterUrl}" onerror="this.src='https://via.placeholder.com/155x195/1a1a30/ffffff?text=${encodeURIComponent(m.title)}'">
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <div class="meta">${m.year} • ⭐ ${m.rating}</div>
                        <div class="desc">${m.description}</div>
                    </div>
                </div>
            `).join('');
        }

        function playMovie(youtubeId) {
            currentYoutubeId = youtubeId;
            const player = document.getElementById('player');
            const iframe = document.getElementById('ytPlayer');
            const titleEl = document.getElementById('playerTitle');
            const errorEl = document.getElementById('playerError');

            const movie = allMovies.find(m => m.youtubeId === youtubeId);
            titleEl.textContent = movie ? `${movie.title} (${movie.year})` : "Фильм";

            errorEl.style.display = 'none';
            iframe.style.display = 'block';
            iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&modestbranding=1`;

            player.style.display = 'flex';
        }

        function watchHero() {
            if (window.currentHeroMovie) playMovie(window.currentHeroMovie.youtubeId);
        }

        function closePlayer() {
            const player = document.getElementById('player');
            const iframe = document.getElementById('ytPlayer');
            iframe.src = '';
            player.style.display = 'none';
        }

        function openOnYouTube() {
            if (currentYoutubeId) {
                window.open(`https://www.youtube.com/watch?v=${currentYoutubeId}`, '_blank');
                closePlayer();
            }
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
