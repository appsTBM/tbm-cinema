<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --pink: #ff2d95;
            --cyan: #00d4ff;
            --purple: #b300ff;
            --bg: #0a0a14;
            --card: #1a1a30;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }
        .header {
            position: sticky;
            top: 0;
            background: rgba(10,10,20,0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255,45,149,0.8);
        }
        .search {
            flex: 1;
            margin: 0 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,45,149,0.4);
            border-radius: 30px;
            padding: 12px 20px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">КИНО</div>
        <input type="text" id="searchInput" class="search" placeholder="🔍 Поиск фильмов...">
    </div>

    <script>
        let allMovies = [];
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Hcwhr8uypBI8Ha2rI1dyaLdA5DVY3ffjfHzNoUlvnfqMOjMmD7Fe1yrTRzwxhCI3Us4XmBBRUisD/pub?output=csv";

        async function loadMovies() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                allMovies = text.trim().split('\n').slice(1).map(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        id: cols[0],
                        title: cols[1],
                        genre: cols[2],
                        year: cols[3],
                        rating: cols[4],
                        description: cols[5],
                        posterUrl: cols[6],
                        youtubeId: cols[7]
                    };
                }).filter(m => m.title);
                alert(`Загружено ${allMovies.length} фильмов!`);
            } catch(e) {
                alert("Ошибка загрузки базы");
            }
        }

        window.Telegram.WebApp.ready();
        loadMovies();
    </script>
</body>
</html>
